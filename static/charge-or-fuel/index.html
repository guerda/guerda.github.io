<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Charge or Fuel</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 600px;
        padding: 40px;
      }

      .better-price {
        color:hsl(100, 100%, 30%);
      }

      .worse-price {
        color: hsl(5, 100%, 36%);
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 20px;
        color: #2d3748;
        text-align: center;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #4a5568;
        margin-bottom: 30px;
      }

      .btn {
        display: inline-block;
        background: #4299e1;
        color: white;
        padding: 12px 30px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
      }

      .btn:hover {
        background: #3182ce;
        transform: translateY(-2px);
        box-shadow: 0 6px 8px rgba(66, 153, 225, 0.3);
      }

      @media (max-width: 768px) {
        .container {
          padding: 30px 20px;
        }

        h1 {
          font-size: 2rem;
        }

        p {
          font-size: 1rem;
        }
      }

      input {
         text-align: center;
         width: 6em;
      }

      @keyframes change-animation {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

    </style>
  </head>
  <body onload="loadData()">
    <div class="container">
    
      <h1>Charge or Fuel?</h1>
      <p>Should you charge or fuel your PHEV?
        Depending on the charging and fuel prices, it might be different.
        Just enter the current prices and consumption, then see what's cheaper.
      </p>
    <p>
      <input
        type="number"
        id="fuel_consumption"
        onchange="calculate()"
        step="0.01"
      />
      l/100 km <br />
      <input
        type="number"
        id="power_consumption"
        onchange="calculate()"
        step="0.01"
      />
      kWh / 100 km <br />
      <input type="number" id="fuel_price" onchange="calculate()" step="0.01" />
      €/l<br />
      <input
        type="number"
        id="power_price"
        onchange="calculate()"
        step="0.01"
      />
      €/kWh

      <div>Costs per kilometer on fuel</div>
      <div id="price_per_km_fuel" class="price-output"></div>
      <div>Costs per kilometer on electricity</div>
      <div id="price_per_km_power" class="price-output"></div>
    </p>
    <div id="price_plot"></div>
    </div>
    
    <script defer src="https://cdn.plot.ly/plotly-3.3.0.min.js" integrity="sha384-9j4dOnaStvA18a0L9YXraOfBpiADen+WXfxp1U03QguLoXMW9b5bKHada4AwQAxK" crossorigin="anonymous"></script>
    <script>
      function loadData() {
        const fuel_consumption = localStorage.getItem("fuel_consumption") || "7.0";
        document.getElementById("fuel_consumption").value = fuel_consumption;
        const power_consumption = localStorage.getItem("power_consumption") || "11.0";
        document.getElementById("power_consumption").value = power_consumption;
        const fuel_price =localStorage.getItem("fuel_price") || "1.69";
        document.getElementById("fuel_price").value = fuel_price
        const power_price = localStorage.getItem("power_price") || "0.49";
        document.getElementById("power_price").value = power_price;
        calculate();
      }

      function calculate() {
        const fuel_consumption = document.getElementById("fuel_consumption").value;
        const power_consumption = document.getElementById("power_consumption").value;
        const fuel_price = document.getElementById("fuel_price").value;
        const power_price = document.getElementById("power_price").value;

        const price_per_km_fuel_out = document.getElementById("price_per_km_fuel");
        const price_per_km_power_out = document.getElementById("price_per_km_power");

        // Store data in local storage
        localStorage.setItem("fuel_consumption", fuel_consumption);
        localStorage.setItem("power_consumption", power_consumption);
        localStorage.setItem("fuel_price", fuel_price);
        localStorage.setItem("power_price", power_price);
        const price_per_km_fuel = (fuel_consumption * fuel_price) / 100;
        const price_per_km_power = (power_consumption * power_price) / 100;
        price_per_km_fuel_out.innerText = `${price_per_km_fuel.toFixed(2)} €/km`;
        price_per_km_power_out.innerText = `${price_per_km_power.toFixed(2)} €/km`;
        console.log("Price per km fuel: ", price_per_km_fuel, "Price per km power: ", price_per_km_power);
        price_per_km_fuel_out.className = "price-output";
        price_per_km_power_out.className = "price-output";
        if (price_per_km_fuel > price_per_km_power) {
          price_per_km_fuel_out.classList.add("worse-price");
          price_per_km_power_out.classList.add("better-price");
        } else if (price_per_km_power > price_per_km_fuel) {
          price_per_km_fuel_out.classList.add("better-price");
          price_per_km_power_out.classList.add("worse-price");
        }
        const animationFrames = { opacity: [0, 1]};
        price_per_km_fuel_out.animate(animationFrames, 1000);
        price_per_km_power_out.animate(animationFrames, 1000);

        plotPrices(fuel_consumption, power_consumption);
      }

      function plotPrices(fuel_consumption, power_consumption) {
        min_fuel_price = 1.70;
        max_fuel_price = 2.20;
        const fuel_price_step = 0.01;

        min_charge_price = 0.00;
        max_charge_price = 0.90;
        const charge_price_step = 0.02;

        xValues = []
        for (i = min_charge_price; i <= max_charge_price; i += charge_price_step) {
          xValues.push(i);
        }

        yValues = []
        for (j = min_fuel_price; i <= max_fuel_price; i += fuel_price_step) {
          yValues.push(i);
        }
      
      zValues = []
      for (j = 0; j < yValues.length; j++) {
        var row = [];
        for (i = 0; i < xValues.length; i++) {
          const fuel_costs = (fuel_consumption * yValues[j]);
          const charge_costs = (power_consumption * xValues[i]);
          if (fuel_costs > charge_costs) {
            row.push(1);
          } else if  (fuel_costs == charge_costs) {
            row.push(0);
          } else {
            row.push(-1);
          }
          
        }
        zValues.push(row);
      }

      var colorscaleValue = [
        [-1.0, '#3D9970'],
        [0.0, '#BBBBBB'],
        [1.0, '#FF0000']
      ];


      var data = [
        {
          z: zValues,
          x: xValues,
          y: yValues,
          type: 'heatmap',
          colorscale: colorscaleValue,
          showscale: false,
          hovertemplate: 'Charging price: %{x}<br>Fuel price: %{y}<br>Charge (1) or fuel (-1): %{z}',
          zauto: false,
           zAxis: { domain: [-1, 1] }
        }
      ];

      var layout = {
        title: {
          text: 'Charge or fuel?',
        },
        xaxis: {
          title: {
            text: "Charging price [€]"
          },
          tickformat: ".2f"
        },
        yaxis: {
          title: {
            text: "Fuel price [€]"
          },
          tickformat: ".2f"
        }
      }

      Plotly.newPlot('price_plot', data, layout);
    }
    </script>
  </body>
</html>
